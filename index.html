<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>تغذية راجعة لمادة الفقة</title>

  <style>
    :root {
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
      --page-bg: #e8e1d9;
      --btn-border: #bf8a52;
      --app-height: 100vh;
      --stage-ratio: 2.02524;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      min-height: 100%;
      background: var(--page-bg);
    }

    body {
      min-height: 100%;
      background: var(--page-bg);
      font-family: "Tahoma", "Arial", sans-serif;
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
      overflow-x: hidden;
      overflow-y: auto;
    }

    .page {
      width: 100%;
      min-height: calc(var(--app-height) + 26px);
      background: var(--page-bg);
      padding:
        calc(var(--safe-top) + 6px)
        max(4px, var(--safe-right))
        calc(var(--safe-bottom) + 14px)
        max(4px, var(--safe-left));
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .safe-stage {
      position: relative;
      width: min(
        calc(100vw - var(--safe-left) - var(--safe-right) - 8px),
        calc((var(--app-height) - var(--safe-top) - var(--safe-bottom) - 22px) * var(--stage-ratio))
      );
      max-width: 1800px;
      margin: 0 auto;
      flex-shrink: 0;
    }

    .stage-image {
      display: block;
      width: 100%;
      height: auto;
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
    }

    .title {
      position: absolute;
      left: 50%;
      top: 51%;
      transform: translate(-50%, -50%);
      width: 78%;
      color: #000;
      text-align: center;
      font-size: clamp(26px, 4.2vw, 82px);
      font-weight: 700;
      line-height: 1.35;
      white-space: normal;
    }

    .start-btn {
      position: absolute;
      left: 50%;
      top: 78%;
      transform: translate(-50%, -50%);
      min-width: clamp(120px, 12vw, 210px);
      padding: clamp(10px, 1vw, 18px) clamp(34px, 4vw, 64px);
      border: clamp(3px, 0.35vw, 7px) solid var(--btn-border);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.14);
      color: #000;
      text-decoration: none;
      text-align: center;
      font-size: clamp(24px, 2.1vw, 44px);
      font-weight: 700;
      line-height: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(1px);
      -webkit-backdrop-filter: blur(1px);
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.18s ease, background 0.18s ease, box-shadow 0.18s ease;
    }

    .start-btn:hover,
    .start-btn:focus-visible {
      transform: translate(-50%, -50%) scale(1.03);
      background: rgba(255, 255, 255, 0.22);
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.08);
      outline: none;
    }

    .start-btn:active {
      transform: translate(-50%, -50%) scale(0.98);
    }

    @media (max-width: 900px) {
      .page {
        min-height: calc(var(--app-height) + 22px);
        padding:
          calc(var(--safe-top) + 5px)
          max(3px, var(--safe-right))
          calc(var(--safe-bottom) + 12px)
          max(3px, var(--safe-left));
      }

      .safe-stage {
        width: min(
          calc(100vw - var(--safe-left) - var(--safe-right) - 6px),
          calc((var(--app-height) - var(--safe-top) - var(--safe-bottom) - 18px) * var(--stage-ratio))
        );
      }

      .title {
        width: 84%;
        font-size: clamp(24px, 5.2vw, 58px);
      }
    }

    @media (max-width: 600px) {
      .page {
        min-height: calc(var(--app-height) + 18px);
        padding:
          calc(var(--safe-top) + 3px)
          max(2px, var(--safe-right))
          calc(var(--safe-bottom) + 10px)
          max(2px, var(--safe-left));
      }

      .safe-stage {
        width: min(
          calc(100vw - var(--safe-left) - var(--safe-right) - 4px),
          calc((var(--app-height) - var(--safe-top) - var(--safe-bottom) - 14px) * var(--stage-ratio))
        );
      }

      .title {
        width: 88%;
        top: 51%;
        font-size: clamp(22px, 6.2vw, 42px);
        line-height: 1.4;
      }

      .start-btn {
        top: 78%;
        min-width: 118px;
        font-size: clamp(22px, 5vw, 34px);
        padding: 11px 34px;
      }
    }

    @media (max-width: 380px) {
      .title {
        width: 90%;
        font-size: clamp(20px, 6.6vw, 34px);
      }

      .start-btn {
        padding: 10px 30px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="safe-stage">
      <img class="stage-image" src="sora1.PNG" alt="" />
      <h1 class="title">تغذية راجعة لمادة الفقة</h1>
      <a class="start-btn" href="page2.html">إبدأ</a>
    </section>
  </main>

  <script>
    (function () {
      const root = document.documentElement;

      function setAppHeight() {
        const h = window.visualViewport && window.visualViewport.height
          ? window.visualViewport.height
          : window.innerHeight;
        root.style.setProperty('--app-height', h + 'px');
      }

      setAppHeight();

      window.addEventListener('resize', setAppHeight, { passive: true });
      window.addEventListener('orientationchange', () => {
        setTimeout(setAppHeight, 80);
        setTimeout(setAppHeight, 250);
      }, { passive: true });

      if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', setAppHeight, { passive: true });
        window.visualViewport.addEventListener('scroll', setAppHeight, { passive: true });
      }
    })();
  </script>
</body>
</html>
