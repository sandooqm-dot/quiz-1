<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تغذية راجعة لمادة الفقة</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "Tahoma", "Arial", sans-serif;
      background: #e9e2da;
    }

    body {
      background-image: url("sora1.PNG");
      background-repeat: no-repeat;
      background-position: center center;
      background-size: cover;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .page {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .content {
      width: 100%;
      max-width: 1200px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 44px;
      text-align: center;
      transform: translateY(18px);
    }

    .title {
      color: #000;
      font-size: clamp(38px, 5vw, 88px);
      font-weight: 700;
      line-height: 1.4;
      text-align: center;
      max-width: 95%;
    }

    .start-btn {
      min-width: 170px;
      padding: 16px 52px;
      border: 7px solid #bf8a52;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.18);
      color: #000;
      font-size: clamp(28px, 2.3vw, 42px);
      font-weight: 700;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
      backdrop-filter: blur(1px);
      -webkit-tap-highlight-color: transparent;
    }

    .start-btn:hover,
    .start-btn:focus-visible {
      transform: scale(1.03);
      background: rgba(255, 255, 255, 0.28);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.10);
      outline: none;
    }

    .start-btn:active {
      transform: scale(0.98);
    }

    @media (max-width: 900px) {
      .content {
        gap: 30px;
        transform: translateY(8px);
      }

      .start-btn {
        min-width: 150px;
        padding: 14px 42px;
        border-width: 5px;
      }
    }

    @media (max-width: 600px) {
      .content {
        gap: 24px;
        transform: translateY(0);
      }

      .title {
        max-width: 100%;
      }

      .start-btn {
        min-width: 135px;
        padding: 12px 34px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="content">
      <h1 class="title">تغذية راجعة لمادة الفقة</h1>

      <a class="start-btn" href="page2.html">إبدأ</a>
    </section>
  </main>
</body>
</html>
