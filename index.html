<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>تغذية راجعة لمادة الفقة</title>

  <style>
    :root {
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
      --page-bg: #BC9A71;
      --brown: #7B5C39;
      --app-height: 100vh;
      --stage-ratio: 2.02524;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      min-height: 100%;
      background: var(--page-bg);
    }

    body {
      min-height: 100%;
      background: var(--page-bg);
      font-family: "Tahoma", "Arial", sans-serif;
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
      overflow-x: hidden;
      overflow-y: auto;
    }

    .page {
      width: 100%;
      min-height: calc(var(--app-height) + 26px);
      background: var(--page-bg);
      padding:
        calc(var(--safe-top) + 6px)
        max(4px, var(--safe-right))
        calc(var(--safe-bottom) + 14px)
        max(4px, var(--safe-left));
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .safe-stage {
      position: relative;
      width: min(
        calc(100vw - var(--safe-left) - var(--safe-right) - 8px),
        calc((var(--app-height) - var(--safe-top) - var(--safe-bottom) - 22px) * var(--stage-ratio))
      );
      max-width: 1800px;
      margin: 0 auto;
      flex-shrink: 0;
    }

    .stage-image {
      display: block;
      width: 100%;
      height: auto;
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
    }

    .screen {
      position: absolute;
      inset: 0;
    }

    .hidden {
      display: none;
    }

    .intro-title {
      position: absolute;
      left: 50%;
      top: 51%;
      transform: translate(-50%, -50%);
      width: 78%;
      color: #000;
      text-align: center;
      font-size: clamp(26px, 4.2vw, 82px);
      font-weight: 700;
      line-height: 1.35;
      white-space: normal;
    }

    .start-btn {
      position: absolute;
      left: 50%;
      top: 78%;
      transform: translate(-50%, -50%);
      min-width: clamp(120px, 12vw, 210px);
      padding: clamp(10px, 1vw, 18px) clamp(34px, 4vw, 64px);
      border: clamp(3px, 0.35vw, 7px) solid var(--brown);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.14);
      color: #000;
      text-decoration: none;
      text-align: center;
      font-size: clamp(24px, 2.1vw, 44px);
      font-weight: 700;
      line-height: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(1px);
      -webkit-backdrop-filter: blur(1px);
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.18s ease, background 0.18s ease, box-shadow 0.18s ease;
      cursor: pointer;
    }

    .start-btn:hover,
    .start-btn:focus-visible {
      transform: translate(-50%, -50%) scale(1.03);
      background: rgba(255, 255, 255, 0.22);
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.08);
      outline: none;
    }

    .start-btn:active {
      transform: translate(-50%, -50%) scale(0.98);
    }

    .question-text {
      position: absolute;
      left: 50%;
      top: 29.2%;
      transform: translate(-50%, -50%);
      width: 88%;
      color: #000;
      text-align: center;
      font-size: clamp(24px, 3.6vw, 64px);
      font-weight: 700;
      line-height: 1.38;
      white-space: normal;
    }

    .question-text.long-question {
      width: 86%;
      font-size: clamp(20px, 3.1vw, 52px);
      line-height: 1.34;
    }

    .question-text.manual-break {
      width: 84%;
      line-height: 1.26;
    }

    .choices-row {
      position: absolute;
      left: 50%;
      top: 55.2%;
      transform: translate(-50%, -50%);
      width: 62%;
      max-width: 980px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: clamp(4px, 0.7vw, 12px);
      direction: rtl;
    }

    .choices-row.compact-row {
      width: 62%;
      max-width: 980px;
      top: 56.1%;
      gap: clamp(4px, 0.7vw, 12px);
    }

    .choices-row.two-choice-row,
    .choices-row.compact-row.two-choice-row {
      width: 46%;
      max-width: 700px;
      gap: clamp(10px, 1.2vw, 18px);
    }

    .choice-btn {
      flex: 0 0 24.5%;
      min-width: 0;
      min-height: clamp(54px, 6.6vw, 100px);
      border: clamp(3px, 0.35vw, 7px) solid var(--brown);
      border-radius: clamp(16px, 1.6vw, 28px);
      background: rgba(236, 230, 223, 0.92);
      color: #000;
      font-size: clamp(22px, 2.4vw, 44px);
      font-weight: 700;
      line-height: 1.12;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 8px 10px;
      cursor: pointer;
      transition: transform 0.15s ease, background 0.15s ease, box-shadow 0.15s ease;
    }

    .choices-row.compact-row .choice-btn {
      flex-basis: 24.5%;
      min-height: clamp(50px, 6vw, 90px);
      font-size: clamp(20px, 2.15vw, 38px);
      border-radius: clamp(14px, 1.4vw, 24px);
      padding: 8px 8px;
    }

    .choices-row.two-choice-row .choice-btn,
    .choices-row.compact-row.two-choice-row .choice-btn {
      flex-basis: 42%;
    }

    .choice-btn:hover,
    .choice-btn:focus-visible {
      transform: translateY(-2px);
      background: rgba(245, 239, 232, 0.98);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
      outline: none;
    }

    .choice-btn:active {
      transform: scale(0.98);
    }

    .choice-btn.selected {
      background: rgba(123, 92, 57, 0.16);
    }

    .nav-row {
      position: absolute;
      left: 50%;
      bottom: 1.7%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: clamp(12px, 1.5vw, 26px);
      direction: rtl;
    }

    .nav-btn {
      min-width: clamp(126px, 14vw, 220px);
      min-height: clamp(48px, 4.5vw, 82px);
      border: none;
      border-radius: 999px;
      background: var(--brown);
      color: #fff;
      font-size: clamp(24px, 2.5vw, 48px);
      font-weight: 700;
      line-height: 1;
      padding: 10px 30px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.15s ease, filter 0.15s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .nav-btn:hover,
    .nav-btn:focus-visible {
      transform: translateY(-1px);
      filter: brightness(1.04);
      outline: none;
    }

    .nav-btn:active {
      transform: scale(0.98);
    }

    @media (max-width: 900px) {
      .page {
        min-height: calc(var(--app-height) + 22px);
        padding:
          calc(var(--safe-top) + 5px)
          max(3px, var(--safe-right))
          calc(var(--safe-bottom) + 12px)
          max(3px, var(--safe-left));
      }

      .safe-stage {
        width: min(
          calc(100vw - var(--safe-left) - var(--safe-right) - 6px),
          calc((var(--app-height) - var(--safe-top) - var(--safe-bottom) - 18px) * var(--stage-ratio))
        );
      }

      .intro-title {
        width: 84%;
        font-size: clamp(24px, 5.2vw, 58px);
      }

      .question-text {
        width: 89%;
        top: 29.4%;
        font-size: clamp(22px, 4vw, 50px);
      }

      .question-text.long-question {
        width: 86%;
        font-size: clamp(19px, 3.4vw, 40px);
      }

      .question-text.manual-break {
        width: 82%;
      }

      .choices-row {
        width: 62%;
        max-width: 780px;
        top: 55%;
        gap: 5px;
      }

      .choices-row.compact-row {
        width: 62%;
        max-width: 780px;
        top: 56%;
        gap: 5px;
      }

      .choices-row.two-choice-row,
      .choices-row.compact-row.two-choice-row {
        width: 52%;
        max-width: 640px;
        gap: 10px;
      }

      .choice-btn {
        flex-basis: 24%;
        font-size: clamp(19px, 2.5vw, 34px);
      }

      .choices-row.compact-row .choice-btn {
        flex-basis: 24%;
        font-size: clamp(17px, 2.2vw, 28px);
      }

      .choices-row.two-choice-row .choice-btn,
      .choices-row.compact-row.two-choice-row .choice-btn {
        flex-basis: 42%;
      }
    }

    @media (max-width: 600px) {
      .page {
        min-height: calc(var(--app-height) + 18px);
        padding:
          calc(var(--safe-top) + 3px)
          max(2px, var(--safe-right))
          calc(var(--safe-bottom) + 10px)
          max(2px, var(--safe-left));
      }

      .safe-stage {
        width: min(
          calc(100vw - var(--safe-left) - var(--safe-right) - 4px),
          calc((var(--app-height) - var(--safe-top) - var(--safe-bottom) - 14px) * var(--stage-ratio))
        );
      }

      .intro-title {
        width: 88%;
        top: 51%;
        font-size: clamp(22px, 6.2vw, 42px);
        line-height: 1.4;
      }

      .start-btn {
        top: 78%;
        min-width: 118px;
        font-size: clamp(22px, 5vw, 34px);
        padding: 11px 34px;
      }

      .question-text {
        width: 90%;
        top: 29%;
        font-size: clamp(18px, 4.6vw, 30px);
        line-height: 1.45;
      }

      .question-text.long-question {
        width: 87%;
        top: 29.8%;
        font-size: clamp(16px, 4vw, 24px);
        line-height: 1.42;
      }

      .question-text.manual-break {
        width: 84%;
        top: 30%;
      }

      .choices-row {
        width: 76%;
        max-width: none;
        top: 55.1%;
        gap: 4px;
      }

      .choices-row.compact-row {
        width: 76%;
        max-width: none;
        top: 56.2%;
        gap: 4px;
      }

      .choices-row.two-choice-row,
      .choices-row.compact-row.two-choice-row {
        width: 58%;
        max-width: none;
        gap: 8px;
      }

      .choice-btn {
        flex-basis: 28.5%;
        min-height: clamp(46px, 8.2vw, 68px);
        font-size: clamp(16px, 3.8vw, 24px);
        border-radius: 16px;
        padding: 8px 8px;
      }

      .choices-row.compact-row .choice-btn {
        flex-basis: 28.5%;
        min-height: clamp(42px, 7.2vw, 60px);
        font-size: clamp(14px, 3.3vw, 20px);
        border-radius: 14px;
        padding: 7px 6px;
      }

      .choices-row.two-choice-row .choice-btn,
      .choices-row.compact-row.two-choice-row .choice-btn {
        flex-basis: 42%;
      }

      .nav-row {
        bottom: 1.2%;
        gap: 10px;
      }

      .nav-btn {
        min-width: clamp(108px, 23vw, 160px);
        min-height: clamp(42px, 8vw, 60px);
        font-size: clamp(18px, 4.4vw, 28px);
        padding: 8px 22px;
      }
    }

    @media (max-width: 380px) {
      .intro-title {
        width: 90%;
        font-size: clamp(20px, 6.6vw, 34px);
      }

      .start-btn {
        padding: 10px 30px;
      }

      .question-text {
        font-size: clamp(16px, 4.7vw, 24px);
      }

      .question-text.long-question {
        font-size: clamp(14px, 4.1vw, 19px);
      }

      .choice-btn {
        font-size: clamp(14px, 4vw, 20px);
      }

      .choices-row.compact-row .choice-btn {
        font-size: clamp(12px, 3.4vw, 17px);
      }

      .nav-btn {
        min-width: 96px;
        padding: 8px 18px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="safe-stage">
      <img class="stage-image" src="sora1.PNG" alt="" />

      <section id="introScreen" class="screen">
        <h1 class="intro-title">تغذية راجعة لمادة الفقة</h1>
        <button id="startBtn" class="start-btn" type="button">إبدأ</button>
      </section>

      <section id="quizScreen" class="screen hidden">
        <h2 id="questionText" class="question-text"></h2>
        <div id="choicesRow" class="choices-row"></div>

        <div class="nav-row">
          <button id="nextBtn" class="nav-btn" type="button">التالي</button>
          <button id="prevBtn" class="nav-btn" type="button">السابق</button>
        </div>
      </section>
    </section>
  </main>

  <script>
    (function () {
      const root = document.documentElement;

      function setAppHeight() {
        const h = window.visualViewport && window.visualViewport.height
          ? window.visualViewport.height
          : window.innerHeight;
        root.style.setProperty('--app-height', h + 'px');
      }

      setAppHeight();

      window.addEventListener('resize', setAppHeight, { passive: true });
      window.addEventListener('orientationchange', () => {
        setTimeout(setAppHeight, 80);
        setTimeout(setAppHeight, 250);
      }, { passive: true });

      if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', setAppHeight, { passive: true });
        window.visualViewport.addEventListener('scroll', setAppHeight, { passive: true });
      }

      const questions = [
        {
          type: 'mcq',
          question: 'الصيام هو الركن ...... من أركان الإسلام',
          choices: ['الثاني', 'الثالث', 'الرابع']
        },
        {
          type: 'mcq',
          question: 'ليلة القدر تكون في العشر ..... من رمضان',
          choices: ['الأوائل', 'الأواسط', 'الأواخر']
        },
        {
          type: 'mcq',
          question: 'الزكاة هي الركن .....',
          choices: ['الأول', 'الثاني', 'الثالث']
        },
        {
          type: 'tf',
          question: 'من مفسدات الصيام<br>القيء عمدًا - النوم - الأكل ناسيًا',
          plainQuestion: 'من مفسدات الصيام القيء عمدًا - النوم - الأكل ناسيًا',
          choices: ['صح', 'خطأ']
        },
        {
          type: 'tf',
          question: 'من الآداب المستحبة في الصيام تأخير السحور',
          choices: ['صح', 'خطأ']
        },
        {
          type: 'tf',
          question: 'الآداب الواجبة في الصيام<br>الحرص على أداء الصلاة في وقتها',
          plainQuestion: 'الآداب الواجبة في الصيام الحرص على أداء الصلاة في وقتها',
          choices: ['صح', 'خطأ']
        },
        {
          type: 'tf',
          question: 'العشر الأواخر هي العشر الأيام الأخيرة من رمضان',
          choices: ['صح', 'خطأ']
        },
        {
          type: 'tf',
          question: 'زكاة الفطر هي ما يدفعه المسلم<br>من طعام للمساكين بعد تمام شهر رمضان',
          plainQuestion: 'زكاة الفطر هي ما يدفعه المسلم من طعام للمساكين بعد تمام شهر رمضان',
          choices: ['صح', 'خطأ']
        }
      ];

      const selectedChoices = new Array(questions.length).fill(null);

      const introScreen = document.getElementById('introScreen');
      const quizScreen = document.getElementById('quizScreen');
      const startBtn = document.getElementById('startBtn');
      const prevBtn = document.getElementById('prevBtn');
      const nextBtn = document.getElementById('nextBtn');
      const questionText = document.getElementById('questionText');
      const choicesRow = document.getElementById('choicesRow');

      let currentQuestionIndex = 0;

      function showIntro() {
        introScreen.classList.remove('hidden');
        quizScreen.classList.add('hidden');
      }

      function showQuiz() {
        introScreen.classList.add('hidden');
        quizScreen.classList.remove('hidden');
        renderQuestion();
      }

      function applyQuestionSizing(current) {
        const rawText = current.plainQuestion || current.question.replace(/<br\s*\/?>/gi, ' ');
        const cleaned = rawText.replace(/\s+/g, '');
        const wordCount = rawText.trim().split(/\s+/).length;
        const isLongQuestion = cleaned.length >= 28 || wordCount >= 6;
        const hasManualBreak = /<br\s*\/?>/i.test(current.question);

        questionText.classList.toggle('long-question', isLongQuestion);
        questionText.classList.toggle('manual-break', hasManualBreak);
        choicesRow.classList.toggle('compact-row', isLongQuestion);
        choicesRow.classList.toggle('two-choice-row', current.type === 'tf');
      }

      function renderQuestion() {
        const current = questions[currentQuestionIndex];
        questionText.innerHTML = current.question;
        applyQuestionSizing(current);
        choicesRow.innerHTML = '';

        current.choices.forEach((choice, choiceIndex) => {
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'choice-btn';
          btn.textContent = choice;

          if (selectedChoices[currentQuestionIndex] === choiceIndex) {
            btn.classList.add('selected');
          }

          btn.addEventListener('click', () => {
            selectedChoices[currentQuestionIndex] = choiceIndex;
            renderQuestion();
          });

          choicesRow.appendChild(btn);
        });
      }

      startBtn.addEventListener('click', () => {
        currentQuestionIndex = 0;
        showQuiz();
      });

      prevBtn.addEventListener('click', () => {
        if (currentQuestionIndex === 0) {
          showIntro();
          return;
        }

        currentQuestionIndex -= 1;
        renderQuestion();
      });

      nextBtn.addEventListener('click', () => {
        if (currentQuestionIndex < questions.length - 1) {
          currentQuestionIndex += 1;
          renderQuestion();
        }
      });
    })();
  </script>
</body>
</html>
