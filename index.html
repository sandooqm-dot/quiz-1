<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />
  <title>تغذية راجعة لمادة الفقة</title>

  <style>
    :root {
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
      --page-bg: #e8e1d9;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      min-height: 100%;
      background: var(--page-bg);
    }

    body {
      min-height: 100%;
      background: var(--page-bg);
      font-family: "Tahoma", "Arial", sans-serif;
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
      overflow-x: hidden;
      overflow-y: auto;
    }

    .page {
      width: 100%;
      min-height: calc(100svh + 40px);
      min-height: calc(100dvh + 40px);
      background: var(--page-bg);
      padding-top: calc(var(--safe-top) + 10px);
      padding-right: max(8px, var(--safe-right));
      padding-bottom: calc(var(--safe-bottom) + 10px);
      padding-left: max(8px, var(--safe-left));
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .safe-stage {
      position: relative;
      width: calc(100vw - var(--safe-left) - var(--safe-right) - 24px);
      max-width: 1880px;
      aspect-ratio: 16 / 9;
      background: url("sora1.PNG") center center / cover no-repeat;
      overflow: hidden;
      flex-shrink: 0;
    }

    .title {
      position: absolute;
      left: 50%;
      top: 46%;
      transform: translate(-50%, -50%);
      width: 78%;
      color: #000;
      text-align: center;
      font-size: clamp(28px, 4.2vw, 82px);
      font-weight: 700;
      line-height: 1.35;
      word-break: keep-all;
    }

    .start-btn {
      position: absolute;
      left: 50%;
      top: 73%;
      transform: translate(-50%, -50%);
      min-width: clamp(120px, 12vw, 210px);
      padding: clamp(10px, 1vw, 18px) clamp(34px, 4vw, 64px);
      border: clamp(3px, 0.35vw, 7px) solid #bf8a52;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.14);
      color: #000;
      text-decoration: none;
      text-align: center;
      font-size: clamp(24px, 2.1vw, 44px);
      font-weight: 700;
      line-height: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(1px);
      -webkit-backdrop-filter: blur(1px);
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.18s ease, background 0.18s ease, box-shadow 0.18s ease;
    }

    .start-btn:hover,
    .start-btn:focus-visible {
      transform: translate(-50%, -50%) scale(1.03);
      background: rgba(255, 255, 255, 0.22);
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.08);
      outline: none;
    }

    .start-btn:active {
      transform: translate(-50%, -50%) scale(0.98);
    }

    @media (max-width: 900px) {
      .page {
        min-height: calc(100svh + 36px);
        min-height: calc(100dvh + 36px);
        padding-top: calc(var(--safe-top) + 8px);
        padding-bottom: calc(var(--safe-bottom) + 8px);
      }

      .safe-stage {
        width: calc(100vw - var(--safe-left) - var(--safe-right) - 18px);
      }

      .title {
        width: 84%;
        font-size: clamp(24px, 5vw, 58px);
      }
    }

    @media (max-width: 600px) {
      .page {
        min-height: calc(100svh + 32px);
        min-height: calc(100dvh + 32px);
        padding-top: calc(var(--safe-top) + 6px);
        padding-right: max(6px, var(--safe-right));
        padding-bottom: calc(var(--safe-bottom) + 6px);
        padding-left: max(6px, var(--safe-left));
      }

      .safe-stage {
        width: calc(100vw - var(--safe-left) - var(--safe-right) - 14px);
      }

      .title {
        width: 88%;
        top: 45%;
        font-size: clamp(22px, 6.2vw, 42px);
        line-height: 1.45;
      }

      .start-btn {
        top: 72%;
        min-width: 120px;
        font-size: clamp(22px, 5vw, 34px);
        padding: 11px 34px;
      }
    }

    @media (max-width: 380px) {
      .safe-stage {
        width: calc(100vw - var(--safe-left) - var(--safe-right) - 12px);
      }

      .title {
        width: 90%;
        font-size: clamp(20px, 6.7vw, 34px);
      }

      .start-btn {
        top: 71.5%;
        padding: 10px 30px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="safe-stage">
      <h1 class="title">تغذية راجعة لمادة الفقة</h1>
      <a class="start-btn" href="page2.html">إبدأ</a>
    </section>
  </main>
</body>
</html>
